<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Symbol Reference — GeoCart Spatial Toolkit</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.svg" />
  <link rel="stylesheet" href="../../assets/css/main.css" />
  <style>
    .symbols-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.5rem;
      padding-bottom: 3rem;
      min-height: 70vh;
    }
    /* Category sidebar */
    .cat-sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      position: sticky;
      top: calc(var(--nav-height) + 1rem);
      align-self: start;
      max-height: calc(100vh - var(--nav-height) - 2rem);
      overflow-y: auto;
    }
    .cat-btn {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: none;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
      width: 100%;
    }
    .cat-btn:hover { background: var(--bg-card); border-color: var(--border); color: var(--text-primary); }
    .cat-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .cat-btn .cat-icon { font-size: 1.05rem; width: 20px; text-align: center; flex-shrink: 0; }
    .cat-count {
      margin-left: auto;
      font-size: 0.65rem;
      background: var(--bg-active);
      border-radius: 10px;
      padding: 0.1rem 0.4rem;
      color: var(--text-muted);
    }

    /* Symbol grid */
    .symbols-content {}
    .search-bar-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .search-bar-row .search-wrapper { flex: 1; min-width: 200px; }

    .category-section {
      margin-bottom: 2.5rem;
    }
    .cat-section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .cat-section-title {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-primary);
    }
    .cat-section-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .symbol-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }
    .symbol-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      position: relative;
    }
    .symbol-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .symbol-card.hidden { display: none; }
    .symbol-svg-wrap {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .symbol-svg-wrap svg { width: 100%; height: 100%; }
    .symbol-name {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .symbol-code {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-muted);
      background: var(--bg-active);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }
    .symbol-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .symbol-detail-overlay.active { display: flex; }
    .symbol-detail-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .symbol-detail-svg {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.5rem;
    }
    .symbol-detail-name {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .symbol-detail-cat {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .symbol-detail-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .symbol-detail-meta {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .symbols-layout { grid-template-columns: 1fr; }
      .cat-sidebar { position: static; max-height: none; flex-direction: row; flex-wrap: wrap; gap: 0.4rem; }
      .cat-btn { width: auto; }
    }
  </style>
</head>
<body>

        </div>
        <div id="symbols-container"></div>
      </div>
    </div>
  </div>
</main>

    <div class="symbol-detail-meta" id="detail-meta"></div>
    <button class="btn btn-secondary btn-sm" style="margin-top:1rem;" onclick="closeDetail()">Close</button>
  </div>
</div>

// ── Category metadata ──
const CATEGORIES = {
  all:        { label:'All Symbols', icon:'⊕', desc:'Browse the complete symbol library.' },
  roads:      { label:'Roads & Transport', icon:'═', desc:'Road types, railways and transport infrastructure symbols.' },
  buildings:  { label:'Buildings & Structures', icon:'⬜', desc:'Structures and built environment features.' },
  vegetation: { label:'Vegetation & Land Cover', icon:'⬡', desc:'Natural and cultivated vegetation types.' },
  water:      { label:'Water Features', icon:'≈', desc:'Rivers, lakes, wetlands and water infrastructure.' },
  boundaries: { label:'Boundaries', icon:'┄', desc:'Administrative, cadastral and protected area boundaries.' },
  utilities:  { label:'Utilities & Infrastructure', icon:'⊞', desc:'Power, pipelines, telecoms and utilities.' },
  aviation:   { label:'Aviation & UAS', icon:'✈', desc:'Airports, airstrips, helipads and drone operations.' },
  control:    { label:'Survey Control Points', icon:'◉', desc:'Geodetic and cadastral control marks.' },
};

// ── State ──
let currentCat = 'all';
let searchTerm = '';

// ── Render ──
function renderSymbols() {
  const container = document.getElementById('symbols-container');
  const sections  = {};

  SYMBOLS.forEach(sym => {
    if (currentCat !== 'all' && sym.category !== currentCat) return;
    const q = searchTerm.toLowerCase();
    if (q && !sym.name.toLowerCase().includes(q) &&
             !sym.description.toLowerCase().includes(q) &&
             !sym.usage.toLowerCase().includes(q) &&
             !sym.code.toLowerCase().includes(q)) return;
    if (!sections[sym.category]) sections[sym.category] = [];
    sections[sym.category].push(sym);
  });

  let visibleCount = 0;
  let html = '';
  for (const [cat, syms] of Object.entries(sections)) {
    visibleCount += syms.length;
    const meta = CATEGORIES[cat];
    html += `<div class="category-section" id="section-${cat}">
      <div class="cat-section-header">
        <span style="font-size:1.2rem;">${meta.icon}</span>
        <div>
          <div class="cat-section-title">${meta.label}</div>
          <div class="cat-section-desc">${meta.desc}</div>
        </div>
        <span class="badge badge-info" style="margin-left:auto;">${syms.length}</span>
      </div>
      <div class="symbol-grid">
        ${syms.map(sym => `
          <div class="symbol-card" onclick="showDetail('${sym.id}')">
            <div class="symbol-svg-wrap">${sym.svg}</div>
            <div class="symbol-name">${sym.name}</div>
            <div class="symbol-code">${sym.code}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  if (visibleCount === 0) {
    html = `<div class="empty-state">
      <div class="empty-title">No symbols found</div>
      <div class="empty-text">Try a different search term or category.</div>
    </div>`;
  }

  container.innerHTML = html;
  document.getElementById('visible-count').textContent = `${visibleCount} symbol${visibleCount !== 1 ? 's' : ''}`;
  document.getElementById('symbol-count-badge').textContent = `${SYMBOLS.length} symbols`;
}

// ── Category counts ──
function updateCounts() {
  const cats = {};
  SYMBOLS.forEach(s => { cats[s.category] = (cats[s.category]||0)+1; });
  document.getElementById('cnt-all').textContent = SYMBOLS.length;
  for (const [cat, count] of Object.entries(cats)) {
    const el = document.getElementById(`cnt-${cat}`);
    if (el) el.textContent = count;
  }
}

// ── Show detail ──
function showDetail(id) {
  const sym = SYMBOLS.find(s => s.id === id);
  if (!sym) return;
  document.getElementById('detail-svg').innerHTML = sym.svg;
  document.getElementById('detail-name').textContent = sym.name;
  document.getElementById('detail-cat').textContent = `${CATEGORIES[sym.category]?.label || sym.category}  ·  ${sym.code}`;
  document.getElementById('detail-desc').textContent = sym.description;
  document.getElementById('detail-meta').innerHTML = `
    <span class="badge badge-info">Usage: ${sym.usage}</span>
  `;
  document.getElementById('symbol-detail-overlay').classList.add('active');
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById('symbol-detail-overlay')) {
    document.getElementById('symbol-detail-overlay').classList.remove('active');
  }
}

// ── Category buttons ──
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderSymbols();
  });
});

// ── Search ──
document.getElementById('symbol-search').addEventListener('input', debounce(e => {
  searchTerm = e.target.value.trim();
  renderSymbols();
}, 200));

// ── Init ──
updateCounts();
renderSymbols();
</script>
